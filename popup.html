<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContextClip</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 300px;
        /* Warm neutral dark — not flat black, not cold blue */
        background: #0e0e13;
        color: #f0f0f5;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
        font-size: 13px;
        line-height: 1.5;
        overflow: hidden;
      }

      /* ── Subtle radial glow in background ─────────────────────────── */
      body::before {
        content: "";
        position: fixed;
        top: -60px;
        left: 50%;
        transform: translateX(-50%);
        width: 260px;
        height: 160px;
        background: radial-gradient(ellipse, rgba(99, 102, 241, 0.18) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      /* ── Main panel ───────────────────────────────────────────────── */
      #main-panel {
        position: relative;
        z-index: 1;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* ── Glass card base ──────────────────────────────────────────── */
      .glass {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      /* ── Header ───────────────────────────────────────────────────── */
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo {
        width: 30px;
        height: 30px;
        border-radius: 9px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .logo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .header-title {
        font-size: 15px;
        font-weight: 700;
        color: #f4f4f8;
        letter-spacing: -0.01em;
      }

      .header-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .badge {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(148, 163, 184, 0.6);
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.07);
        padding: 2px 6px;
        border-radius: 5px;
      }

      #gear-btn {
        background: transparent;
        border: none;
        color: rgba(148, 163, 184, 0.5);
        cursor: pointer;
        font-size: 15px;
        line-height: 1;
        padding: 5px;
        border-radius: 7px;
        transition: color 0.15s, background 0.15s, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      #gear-btn:hover  { color: #f0f0f5; background: rgba(255,255,255,0.07); }
      #gear-btn.active { color: #818cf8; transform: rotate(90deg); }

      /* ── Capture button ───────────────────────────────────────────── */
      #capture-btn {
        width: 100%;
        padding: 12px 18px;
        background: linear-gradient(135deg, #6366f1 0%, #818cf8 50%, #a5b4fc 100%);
        background-size: 200% 200%;
        color: #fff;
        border: none;
        border-radius: 11px;
        font-size: 13.5px;
        font-weight: 700;
        letter-spacing: 0.01em;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        position: relative;
        overflow: hidden;
        transition: transform 0.15s, box-shadow 0.2s, background-position 0.4s;
        box-shadow:
          0 1px 0 rgba(255,255,255,0.15) inset,
          0 6px 20px rgba(99, 102, 241, 0.45);
        animation: btn-shimmer 4s ease infinite;
      }
      @keyframes btn-shimmer {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      /* Top gloss highlight */
      #capture-btn::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 50%;
        background: linear-gradient(rgba(255,255,255,0.14), transparent);
        border-radius: 11px 11px 40% 40%;
        pointer-events: none;
      }
      #capture-btn:hover  { transform: translateY(-2px); box-shadow: 0 1px 0 rgba(255,255,255,0.2) inset, 0 10px 28px rgba(99,102,241,0.55); }
      #capture-btn:active { transform: translateY(0); box-shadow: 0 1px 0 rgba(255,255,255,0.1) inset, 0 4px 12px rgba(99,102,241,0.3); }
      #capture-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; animation: none; }

      .btn-icon { font-size: 16px; opacity: 0.9; }

      /* ── Shortcuts row ────────────────────────────────────────────── */
      .shortcuts-row {
        display: flex;
        gap: 5px;
        align-items: center;
      }

      .shortcut-pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 6px;
        padding: 3px 8px;
        font-size: 10px;
        color: rgba(148, 163, 184, 0.6);
        font-family: "SF Mono", "Fira Code", ui-monospace, monospace;
      }

      .shortcut-pill .key {
        background: rgba(255,255,255,0.09);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 3px;
        padding: 0px 4px;
        color: rgba(226,232,240,0.85);
        font-size: 9.5px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      #customize-shortcuts-link {
        margin-left: auto;
        font-size: 10px;
        color: rgba(148,163,184,0.35);
        cursor: pointer;
        text-decoration: none;
        transition: color 0.15s;
        white-space: nowrap;
      }
      #customize-shortcuts-link:hover { color: #818cf8; }

      /* ── Status line ──────────────────────────────────────────────── */
      #activate-status {
        font-size: 11px;
        color: rgba(148,163,184,0.4);
        text-align: center;
        min-height: 13px;
        transition: color 0.15s;
      }
      #activate-status.error   { color: #f87171; }
      #activate-status.success { color: #4ade98; }

      /* ── Settings panel ───────────────────────────────────────────── */
      #settings-panel {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
        opacity: 0;
        border-top: 1px solid transparent;
        position: relative;
        z-index: 1;
      }
      #settings-panel.open {
        max-height: 320px;
        opacity: 1;
        border-top-color: rgba(255,255,255,0.06);
      }

      .settings-inner {
        padding: 14px 16px 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: rgba(255,255,255,0.02);
      }

      .settings-title {
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(148,163,184,0.35);
      }

      /* ── Field ────────────────────────────────────────────────────── */
      .field { display: flex; flex-direction: column; gap: 6px; }

      .field label {
        font-size: 11.5px;
        font-weight: 600;
        color: rgba(226,232,240,0.7);
      }

      /* ── Folder display ───────────────────────────────────────────── */
      .folder-display {
        display: flex;
        align-items: center;
        gap: 9px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px;
        padding: 8px 11px;
        min-height: 36px;
        transition: border-color 0.15s;
      }

      .folder-icon { font-size: 15px; flex-shrink: 0; opacity: 0.8; }

      .folder-name {
        font-size: 11.5px;
        color: rgba(148,163,184,0.5);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: "SF Mono", "Fira Code", ui-monospace, monospace;
        flex: 1;
      }
      .folder-name.set {
        color: rgba(226,232,240,0.9);
        font-weight: 500;
      }

      /* ── Choose folder button ─────────────────────────────────────── */
      #choose-folder-btn {
        width: 100%;
        padding: 8px 14px;
        background: rgba(255,255,255,0.04);
        color: rgba(148,163,184,0.7);
        border: 1px dashed rgba(255,255,255,0.12);
        border-radius: 8px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      #choose-folder-btn:hover {
        background: rgba(99,102,241,0.1);
        color: #a5b4fc;
        border-color: rgba(99,102,241,0.4);
        border-style: solid;
      }

      /* ── Save button ──────────────────────────────────────────────── */
      #save-settings-btn {
        width: 100%;
        padding: 8px 14px;
        background: rgba(255,255,255,0.05);
        color: rgba(148,163,184,0.7);
        border: 1px solid rgba(255,255,255,0.09);
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
      }
      #save-settings-btn:hover {
        background: rgba(255,255,255,0.09);
        color: #f0f0f5;
        border-color: rgba(255,255,255,0.15);
      }
      #save-settings-btn.saved {
        color: #4ade98;
        border-color: rgba(74,222,152,0.2);
        background: rgba(74,222,152,0.06);
      }

      /* ── Hint text ────────────────────────────────────────────────── */
      .field-hint {
        font-size: 10.5px;
        color: rgba(148,163,184,0.35);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>

    <!-- ── Main panel ──────────────────────────────────────────────────── -->
    <div id="main-panel">

      <div class="header">
        <div class="logo"><img src="icons/CC-icon.png" alt="ContextClip"></div>
        <span class="header-title">ContextClip</span>
        <div class="header-right">
          <span class="badge">v1.0</span>
          <button id="gear-btn" title="Settings">⚙</button>
        </div>
      </div>

      <button id="capture-btn">
        <span class="btn-icon">⊹</span>
        Start Capture
      </button>

      <p id="activate-status"></p>

      <div class="shortcuts-row">
        <span class="shortcut-pill"><span class="key">⌥⇧C</span> capture</span>
        <span class="shortcut-pill"><span class="key">⌥⇧F</span> popup</span>
        <a id="customize-shortcuts-link" href="#">customize →</a>
      </div>

    </div>

    <!-- ── Settings panel ─────────────────────────────────────────────── -->
    <div id="settings-panel">
      <div class="settings-inner">

        <p class="settings-title">Settings</p>

        <div class="field">
          <label>Save screenshots to</label>

          <div class="folder-display" id="folder-display">
            <span class="folder-icon">📁</span>
            <span class="folder-name" id="folder-name">Not set</span>
          </div>

          <button id="choose-folder-btn">
            <span>＋</span> Choose folder…
          </button>

          <p class="field-hint" id="folder-hint">
            No folder chosen — saves to ~/Downloads/contextclip/ by default.
          </p>
        </div>

        <button id="save-settings-btn">Save</button>

      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
